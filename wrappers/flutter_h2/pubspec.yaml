name: flutter_h2
description: "H2 VPN Engine - Drop-in replacement for vpnclient_engine_flutter using h2.core backend"
version: 0.1.0
homepage: https://github.com/vpnclient/flutter_h2

environment:
  sdk: ^3.11.5
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: net.nativemind.h2.core.flutter_h2
        pluginClass: FlutterH2Plugin
      ios:
        pluginClass: FlutterH2Plugin
